<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#bd6437">
<title>營建法規刷題 113–114</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ============ THEME TOKENS ============ */
:root{
  --surround:#e7e0d2;
  --bg:#f3efe7;
  --surface:#ffffff;
  --surface-2:#faf6ee;
  --border:#e8e1d4;
  --border-strong:#d9d0bf;
  --text:#2b2823;
  --text-muted:#8a8175;
  --text-faint:#ada595;
  --accent:#bd6437;
  --accent-press:#a5532b;
  --accent-soft:#f6e7db;
  --ok:#3c8a55; --ok-bg:#e6f1e6; --ok-border:#c2e0c5;
  --bad:#c44f3e; --bad-bg:#fae5e0; --bad-border:#f0c8bf;
  --warn:#9a6a0f; --warn-bg:#fbeecb; --warn-border:#eed79a;
  --info:#3a6396; --info-bg:#e6eef6; --info-border:#c6d6e8;
  --law-bg:#2c2922; --law-2:#3a352b; --law-text:#e9e1d2; --law-accent:#e3a974;
  --shadow-sm:0 1px 2px rgba(60,48,30,.06);
  --shadow:0 1px 2px rgba(60,48,30,.05),0 6px 22px rgba(60,48,30,.07);
  --shadow-lg:0 8px 34px rgba(60,48,30,.12);
}
html[data-theme="dark"]{
  --surround:#100e0a;
  --bg:#17140f;
  --surface:#2a251c;
  --surface-2:#39322a;
  --border:#4d4432;
  --border-strong:#615641;
  --text:#ece5d8;
  --text-muted:#a59c8b;
  --text-faint:#776e5f;
  --accent:#d4794c;
  --accent-press:#bd6437;
  --accent-soft:#3a2b21;
  --ok:#6dbe83; --ok-bg:#253629; --ok-border:#3a5841;
  --bad:#e08272; --bad-bg:#392622; --bad-border:#5b3932;
  --warn:#e0b45c; --warn-bg:#393015; --warn-border:#5b4c23;
  --info:#85aedb; --info-bg:#212f3e; --info-border:#37506a;
  --law-bg:#16130d; --law-2:#221d14; --law-text:#e6ddca; --law-accent:#e3a974;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.32);
  --shadow-lg:0 10px 36px rgba(0,0,0,.45);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;overflow-x:hidden;}
body{
  background:var(--surround);
  color:var(--text);
  font-family:"Microsoft JhengHei","Microsoft JhengHei UI",system-ui,-apple-system,"PingFang TC","Noto Sans TC",sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input{font-family:inherit;}
.hidden{display:none !important;}

/* ============ SHELL ============ */
.app{
  max-width:500px;
  margin:0 auto;
  min-height:100vh;
  background:var(--bg);
  position:relative;
  transition:background .25s ease;
}
@media (min-width:520px){
  .app{box-shadow:var(--shadow-lg);}
}

.appbar{
  position:sticky;top:0;z-index:30;
  background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(140%) blur(14px);
  -webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--border);
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0;}
.brand__logo{
  width:38px;height:38px;flex:none;border-radius:11px;
  background:linear-gradient(150deg,var(--accent),var(--accent-press));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Microsoft JhengHei","Microsoft JhengHei UI",sans-serif;font-weight:700;font-size:20px;
  box-shadow:0 3px 10px color-mix(in srgb,var(--accent) 40%,transparent);
}
.brand__title{font-weight:900;font-size:16px;letter-spacing:.01em;line-height:1.15;white-space:nowrap;}
.brand__sub{font-size:11px;color:var(--text-faint);font-weight:500;letter-spacing:.04em;}
.appbar__right{display:flex;align-items:center;gap:8px;flex:none;}

.progress-pill{
  font-size:12px;font-weight:700;color:var(--accent);
  background:var(--accent-soft);padding:5px 10px;border-radius:999px;
  font-variant-numeric:tabular-nums;white-space:nowrap;
}
.iconbtn{
  width:36px;height:36px;border-radius:10px;flex:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);border:1px solid var(--border);background:var(--surface);
  transition:transform .12s,background .15s,color .15s;
}
.iconbtn:active{transform:scale(.9);}
.iconbtn svg{width:18px;height:18px;}
.user-chip{
  display:flex;align-items:center;gap:6px;max-width:130px;
  padding:6px 11px;border-radius:999px;font-size:12.5px;font-weight:700;
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  transition:transform .12s;
}
.user-chip:active{transform:scale(.94);}
.user-chip__name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-chip svg{width:13px;height:13px;color:var(--text-faint);flex:none;}

main{
  padding:18px 16px 110px;
  animation:viewIn .32s ease;
}
@keyframes viewIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ============ BOTTOM TAB BAR ============ */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:500px;z-index:40;
  background:color-mix(in srgb,var(--surface) 88%,transparent);
  backdrop-filter:saturate(150%) blur(16px);
  -webkit-backdrop-filter:saturate(150%) blur(16px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:11px 4px 13px;font-size:11.5px;font-weight:700;color:var(--text-faint);
  position:relative;transition:color .18s;
}
.tab svg{width:23px;height:23px;transition:transform .2s;}
.tab.active{color:var(--accent);}
.tab.active svg{transform:translateY(-1px);}
.tab.active::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:30px;height:3px;border-radius:0 0 4px 4px;background:var(--accent);
}
.tab:active svg{transform:scale(.86);}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border-radius:13px;font-weight:700;font-size:14.5px;padding:13px 16px;
  transition:transform .12s,background .15s,box-shadow .15s;
}
.btn:active{transform:scale(.97);}
.btn--accent{background:var(--accent);color:#fff;box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 36%,transparent);}
.btn--accent:active{background:var(--accent-press);}
.btn--soft{background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border);}
.btn--ok{background:var(--ok);color:#fff;}
.btn--ghost{background:transparent;color:var(--accent);font-weight:700;}
.btn--block{width:100%;}

/* ============ USER SELECT ============ */
.hero{text-align:center;padding:26px 8px 22px;}
.hero__logo{
  width:62px;height:62px;margin:0 auto 14px;border-radius:18px;
  background:linear-gradient(150deg,var(--accent),var(--accent-press));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Microsoft JhengHei","Microsoft JhengHei UI",sans-serif;font-weight:700;font-size:34px;
  box-shadow:0 8px 22px color-mix(in srgb,var(--accent) 38%,transparent);
}
.hero__title{font-size:19px;font-weight:900;margin:0 0 5px;}
.hero__sub{font-size:13px;color:var(--text-muted);margin:0;max-width:300px;margin-inline:auto;}
.block{margin-bottom:22px;}
.block__label{font-size:12px;font-weight:700;color:var(--text-faint);letter-spacing:.05em;margin-bottom:10px;text-transform:uppercase;}
.user-row{
  width:100%;display:flex;align-items:center;gap:12px;text-align:left;
  background:var(--surface);border:1px solid var(--border);border-radius:15px;
  padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow-sm);
  transition:transform .12s,box-shadow .15s,border-color .15s;
}
.user-row:active{transform:scale(.98);border-color:var(--accent);box-shadow:var(--shadow);}
.user-row__avatar{
  width:38px;height:38px;flex:none;border-radius:11px;background:var(--accent-soft);
  color:var(--accent);display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:17px;
}
.user-row__name{flex:1;font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-row__go{color:var(--text-faint);font-size:16px;}
.empty-hint{font-size:13px;color:var(--text-faint);text-align:center;padding:18px;background:var(--surface-2);border-radius:13px;border:1px dashed var(--border-strong);}
.newuser{display:flex;gap:9px;}
.newuser input{
  flex:1;min-width:0;border:1px solid var(--border-strong);background:var(--surface);
  border-radius:13px;padding:12px 14px;font-size:14.5px;color:var(--text);
  transition:border-color .15s,box-shadow .15s;
}
.newuser input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.newuser input::placeholder{color:var(--text-faint);}

/* ============ PRACTICE CARD ============ */
.mode-strip{
  display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;
}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:999px;}
.pill--rose{background:var(--bad-bg);color:var(--bad);}
.pill--blue{background:var(--accent-soft);color:var(--accent);}
.pill--ghost{background:transparent;color:var(--text-faint);text-decoration:underline;text-underline-offset:2px;font-weight:600;}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:18px 17px;box-shadow:var(--shadow);margin-bottom:16px;
}
.card__meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
.qid{font-size:11px;font-weight:700;font-family:ui-monospace,"SF Mono",Menlo,monospace;color:var(--text-faint);letter-spacing:.02em;}
.qcount{font-size:12px;font-weight:700;color:var(--text-muted);font-variant-numeric:tabular-nums;}
.flags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.flag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;}
.flag--warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border);}
.flag--rose{background:var(--bad-bg);color:var(--bad);}
.qtext{
  font-size:17px;font-weight:500;line-height:1.62;margin:0 0 16px;
  letter-spacing:.005em;overflow-wrap:anywhere;word-break:break-word;
  white-space:pre-wrap;text-wrap:pretty;
}

.opts{display:flex;flex-direction:column;gap:9px;}
.opt{
  display:flex;align-items:flex-start;gap:11px;text-align:left;width:100%;
  background:var(--surface-2);border:1.5px solid var(--border);border-radius:15px;
  padding:13px 14px;min-height:52px;font-size:14.5px;line-height:1.5;color:var(--text);
  transition:transform .1s,border-color .15s,background .2s,box-shadow .15s;
  position:relative;overflow-wrap:anywhere;word-break:break-word;
}
.opt:not(:disabled):active{transform:scale(.98);border-color:var(--accent);box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 18%,transparent);}
.opt__badge{
  width:25px;height:25px;flex:none;border-radius:8px;background:var(--surface);
  border:1px solid var(--border-strong);color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12.5px;
  transition:background .2s,color .2s,border-color .2s;
}
.opt__text{flex:1;padding-top:2px;font-weight:500;}
.opt__mark{flex:none;font-weight:900;font-size:16px;width:18px;text-align:center;align-self:center;opacity:0;transition:opacity .2s;}
.opt:disabled{cursor:default;}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok);}
.opt.correct .opt__badge{background:var(--ok);border-color:var(--ok);color:#fff;}
.opt.correct .opt__text{font-weight:700;}
.opt.correct .opt__mark{opacity:1;color:var(--ok);}
.opt.correct .opt__mark::before{content:"✓";}
.opt.wrong{background:var(--bad-bg);border-color:var(--bad-border);color:var(--bad);}
.opt.wrong .opt__badge{background:var(--bad);border-color:var(--bad);color:#fff;}
.opt.wrong .opt__text{font-weight:700;}
.opt.wrong .opt__mark{opacity:1;color:var(--bad);}
.opt.wrong .opt__mark::before{content:"✕";}
.opt.dim{opacity:.46;}

/* ============ ANSWER PANEL ============ */
.answer{margin-top:15px;display:flex;flex-direction:column;gap:10px;animation:panelIn .34s cubic-bezier(.2,.7,.3,1);}
@keyframes panelIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.banner{border-radius:14px;padding:13px 14px;border:1px solid transparent;}
.banner--ok{background:var(--ok-bg);border-color:var(--ok-border);}
.banner--bad{background:var(--bad-bg);border-color:var(--bad-border);}
.banner__head{font-weight:900;font-size:15px;margin:0 0 4px;display:flex;align-items:center;gap:7px;}
.banner--ok .banner__head{color:var(--ok);}
.banner--bad .banner__head{color:var(--bad);}
.banner__ans{font-size:13.5px;color:var(--text);}
.banner__ans b{font-weight:900;}
.banner__reason{font-size:12px;color:var(--text-muted);margin-top:4px;overflow-wrap:anywhere;}

.alert{border-radius:14px;padding:13px 14px;border:1px solid transparent;}
.alert__label{font-size:12px;font-weight:900;margin:0 0 6px;display:flex;align-items:center;gap:6px;letter-spacing:.02em;}
.alert__body{font-size:13.5px;line-height:1.62;color:var(--text);overflow-wrap:anywhere;word-break:break-word;text-wrap:pretty;}
.alert--warn{background:var(--warn-bg);border-color:var(--warn-border);}
.alert--warn .alert__label{color:var(--warn);}
.alert--info{background:var(--info-bg);border-color:var(--info-border);}
.alert--info .alert__label{color:var(--info);}
.alert--neutral{background:var(--surface-2);border-color:var(--border);}
.alert--neutral .alert__label{color:var(--text-muted);}
.alert__meta{font-size:11.5px;color:var(--text-faint);margin-top:8px;}

/* law article = dark document block */
.lawblock{
  background:var(--law-bg);border-radius:14px;padding:14px 15px;
  border:1px solid color-mix(in srgb,var(--law-bg) 70%,#000);
}
.lawblock__label{font-size:12px;font-weight:900;color:var(--law-accent);margin:0 0 7px;display:flex;align-items:center;gap:6px;letter-spacing:.04em;}
.lawblock__body{
  font-family:"Microsoft JhengHei","Microsoft JhengHei UI",sans-serif;font-size:14.5px;line-height:1.78;color:var(--law-text);
  overflow-wrap:anywhere;word-break:break-word;text-wrap:pretty;
}
.lawblock__body .law-art{color:var(--law-accent);font-weight:700;}

/* nav buttons */
.navrow{display:flex;gap:10px;margin-bottom:6px;}
.navrow .btn{flex:1;}

/* ============ REVIEW BOOK ============ */
.review-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
.review-head h2{font-size:18px;font-weight:900;margin:0;}
.count-strong{color:var(--accent);}
.tree{display:flex;flex-direction:column;gap:6px;}
.tnode{position:relative;}
.thead{
  width:100%;display:flex;align-items:center;gap:9px;text-align:left;
  background:var(--surface);border:1px solid var(--border);border-radius:13px;
  padding:11px 13px;transition:transform .1s,background .15s,border-color .15s;
}
.thead:active{transform:scale(.99);background:var(--surface-2);}
.tnode--d0 > .thead{font-weight:900;font-size:14.5px;}
.tnode--d1 > .thead{font-weight:700;font-size:13.5px;background:var(--surface-2);}
.tnode--d2 > .thead{font-weight:500;font-size:13px;background:transparent;border-style:dashed;}
.tchev{
  width:18px;height:18px;flex:none;color:var(--text-faint);
  transition:transform .26s cubic-bezier(.3,.7,.3,1);display:flex;align-items:center;justify-content:center;
}
.tnode.open > .thead .tchev{transform:rotate(90deg);}
.tlabel{flex:1;overflow-wrap:anywhere;word-break:break-word;}
.tcount{
  flex:none;font-size:11.5px;font-weight:900;color:var(--accent);
  background:var(--accent-soft);min-width:24px;text-align:center;
  padding:3px 8px;border-radius:999px;font-variant-numeric:tabular-nums;
}
.tbody{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s cubic-bezier(.3,.7,.3,1);}
.tbody > .tbody__in{overflow:hidden;}
.tnode.open > .tbody{grid-template-rows:1fr;}
.tbody__in{padding:6px 0 2px 12px;margin-top:5px;border-left:2px solid var(--border);display:flex;flex-direction:column;gap:6px;}

.witem{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px 13px;box-shadow:var(--shadow-sm);}
.witem__top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px;}
.witem__top .qid{color:var(--bad);background:var(--bad-bg);padding:3px 8px;border-radius:7px;}
.witem__rm{font-size:11.5px;font-weight:700;color:var(--text-faint);padding:4px 8px;border-radius:8px;transition:background .15s,color .15s;}
.witem__rm:active{background:var(--bad-bg);color:var(--bad);}
.witem__q{font-size:13.5px;font-weight:700;line-height:1.55;margin:0 0 7px;overflow-wrap:anywhere;word-break:break-word;white-space:pre-wrap;}
.witem__line{font-size:12px;line-height:1.55;margin:3px 0;overflow-wrap:anywhere;word-break:break-word;}
.witem__line .lbl{font-weight:700;}
.witem__line.ans{color:var(--text-muted);}
.witem__line.law{color:var(--info);}
.witem__line.exp{color:var(--text-muted);}
.witem__line.ext{color:var(--warn);}

.center-state{text-align:center;color:var(--text-muted);padding:70px 20px;}
.center-state__emoji{font-size:46px;margin-bottom:12px;}
.center-state p{font-size:14px;margin:0;}
.loadwrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:90px 20px;color:var(--text-faint);}
.spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.errbox{text-align:center;color:var(--bad);padding:70px 20px;}
.errbox__emoji{font-size:40px;margin-bottom:10px;}
.errbox p{margin:6px 0;}
.errbox .hint{font-size:12px;color:var(--text-faint);}
</style>
</head>
<body>

<div class="app">
  <header class="appbar">
    <div class="brand">
      <div class="brand__logo">法</div>
      <div>
        <div class="brand__title">營建法規刷題</div>
        <div class="brand__sub">113 – 114 年題庫</div>
      </div>
    </div>
    <div class="appbar__right">
      <div id="progressBadge" class="progress-pill hidden"></div>
      <button id="themeToggle" class="iconbtn" aria-label="切換深淺色"></button>
      <button id="exportDataBtn" class="iconbtn hidden" aria-label="匯出備份檔" title="匯出我的進度與錯題本">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
      </button>
      <button id="switchUserBtn" class="user-chip hidden" aria-label="切換使用者">
        <span id="currentUserBadge" class="user-chip__name"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3l4 4-4 4M20 7H7M8 21l-4-4 4-4M4 17h13"/></svg>
      </button>
    </div>
  </header>

  <main id="mainArea">
    <div class="loadwrap"><div class="spinner"></div><p>正在載入題庫…</p></div>
  </main>
</div>

<input type="file" id="importFileInput" accept="application/json,.json" class="hidden" />


<nav id="bottomNav" class="tabbar hidden">
  <button id="navPractice" class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
    <span>開始刷題</span>
  </button>
  <button id="navReview" class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span>錯題複習本</span>
  </button>
</nav>

<script>
const DATA_URL = encodeURI('(114-113)_questions.json');
const LS_USERS_KEY = 'law_quiz_users_v1';
const LS_WRONG_PREFIX = 'law_quiz_wrong_v1__';
const LS_PROGRESS_PREFIX = 'law_quiz_progress_v1__';
const LS_THEME_KEY = 'law_quiz_theme_v1';

let ALL_QUESTIONS = [];
let currentIndex = 0;
let currentView = 'practice';
let shuffledOrder = [];
let currentUser = null;
let isReviewPracticeMode = false;
let reviewOrder = [];
let reviewIndex = 0;

const mainArea = document.getElementById('mainArea');
const navPractice = document.getElementById('navPractice');
const navReview = document.getElementById('navReview');
const progressBadge = document.getElementById('progressBadge');
const bottomNav = document.getElementById('bottomNav');
const currentUserBadge = document.getElementById('currentUserBadge');
const switchUserBtn = document.getElementById('switchUserBtn');
const themeToggle = document.getElementById('themeToggle');
const exportDataBtn = document.getElementById('exportDataBtn');
const importFileInput = document.getElementById('importFileInput');

/* ---------- Theme ---------- */
const ICON_SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 1.5v2.5M12 20v2.5M4.2 4.2l1.8 1.8M18 18l1.8 1.8M1.5 12H4M20 12h2.5M4.2 19.8L6 18M18 6l1.8-1.8"/></svg>';
const ICON_MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/></svg>';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  themeToggle.innerHTML = (t === 'dark') ? ICON_SUN : ICON_MOON;
  try { localStorage.setItem(LS_THEME_KEY, t); } catch(e){}
}
(function initTheme(){
  let saved;
  try { saved = localStorage.getItem(LS_THEME_KEY); } catch(e){}
  if (!saved) saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  applyTheme(saved);
})();
themeToggle.addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
});

/* ---------- Storage ---------- */
function loadUserList() {
  try { return JSON.parse(localStorage.getItem(LS_USERS_KEY)) || []; } catch(e) { return []; }
}
function saveUserList(list) {
  localStorage.setItem(LS_USERS_KEY, JSON.stringify(list));
}
function loadWrongBook() {
  if (!currentUser) return {};
  try { return JSON.parse(localStorage.getItem(LS_WRONG_PREFIX + currentUser)) || {}; } catch(e) { return {}; }
}
function saveWrongBook(book) {
  if (!currentUser) return;
  localStorage.setItem(LS_WRONG_PREFIX + currentUser, JSON.stringify(book));
}
function loadProgress() {
  if (!currentUser) return { index: 0 };
  try { return JSON.parse(localStorage.getItem(LS_PROGRESS_PREFIX + currentUser)) || { index: 0 }; } catch(e) { return { index: 0 }; }
}
function saveProgress() {
  if (!currentUser) return;
  localStorage.setItem(LS_PROGRESS_PREFIX + currentUser, JSON.stringify({ index: currentIndex }));
}

/* ---------- Export / Import ---------- */
function exportUserData() {
  if (!currentUser) return;
  const payload = {
    type: 'law_quiz_backup',
    version: 1,
    user: currentUser,
    exportedAt: new Date().toISOString(),
    progress: loadProgress(),
    wrongBook: loadWrongBook()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `law_quiz_backup_${currentUser}_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importUserDataFromFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try { data = JSON.parse(reader.result); } catch(e) {
      alert('匯入失敗：檔案內容不是有效的JSON格式');
      return;
    }
    if (!data || data.type !== 'law_quiz_backup' || !data.user) {
      alert('匯入失敗：這不是有效的備份檔');
      return;
    }
    const targetUser = data.user;
    const users = loadUserList();
    if (!users.includes(targetUser)) {
      users.push(targetUser);
      saveUserList(users);
    }
    if (data.wrongBook && typeof data.wrongBook === 'object') {
      const existing = JSON.parse(localStorage.getItem(LS_WRONG_PREFIX + targetUser) || '{}');
      const merged = Object.assign({}, existing, data.wrongBook);
      localStorage.setItem(LS_WRONG_PREFIX + targetUser, JSON.stringify(merged));
    }
    if (data.progress && typeof data.progress === 'object') {
      localStorage.setItem(LS_PROGRESS_PREFIX + targetUser, JSON.stringify(data.progress));
    }
    alert(`已成功匯入使用者「${targetUser}」的備份資料！`);
    renderUserSelectScreen();
  };
  reader.onerror = () => alert('讀取檔案失敗');
  reader.readAsText(file);
}

exportDataBtn.addEventListener('click', exportUserData);
importFileInput.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (file) importUserDataFromFile(file);
  importFileInput.value = '';
});

/* ---------- User Selection ---------- */
function renderUserSelectScreen() {
  bottomNav.classList.add('hidden');
  switchUserBtn.classList.add('hidden');
  exportDataBtn.classList.add('hidden');
  progressBadge.classList.add('hidden');
  progressBadge.textContent = '';

  const users = loadUserList();
  const usersHtml = users.length === 0
    ? `<div class="empty-hint">尚未建立任何使用者，請於下方新增</div>`
    : users.map(u => `
      <button class="user-row select-user-btn" data-user="${escapeHtml(u)}">
        <span class="user-row__avatar">${escapeHtml(u.slice(0,1).toUpperCase())}</span>
        <span class="user-row__name">${escapeHtml(u)}</span>
        <span class="user-row__go">→</span>
      </button>`).join('');

  mainArea.innerHTML = `
    <div class="hero">
      <div class="hero__logo">法</div>
      <h2 class="hero__title">選擇使用者開始作答</h2>
      <p class="hero__sub">每位使用者的作答進度與錯題複習本會分開記錄</p>
    </div>
    <section class="block">
      <div class="block__label">已建立的帳號</div>
      ${usersHtml}
    </section>
    <section class="block">
      <div class="block__label">建立新使用者</div>
      <div class="newuser">
        <input id="newUserInput" type="text" maxlength="20" placeholder="輸入使用者名稱" autocomplete="off" />
        <button id="createUserBtn" class="btn btn--accent">建立</button>
      </div>
    </section>
    <section class="block">
      <div class="block__label">從其他裝置匯入備份</div>
      <button id="importDataBtn" class="btn btn--soft btn--block">📂 選擇備份檔（.json）匯入</button>
      <p style="font-size:11.5px;color:var(--text-faint);margin-top:8px;line-height:1.6;">在其他裝置點右上角匯出圖示備份檔案後，透過Email／LINE等方式傳到這台裝置，再用本功能匯入即可同步作答進度與錯題本。</p>
    </section>
  `;

  document.querySelectorAll('.select-user-btn').forEach(btn => {
    btn.addEventListener('click', () => enterAsUser(btn.getAttribute('data-user')));
  });
  document.getElementById('createUserBtn').addEventListener('click', handleCreateUser);
  document.getElementById('newUserInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleCreateUser();
  });
  document.getElementById('importDataBtn').addEventListener('click', () => importFileInput.click());
}

function handleCreateUser() {
  const input = document.getElementById('newUserInput');
  const name = (input.value || '').trim();
  if (!name) { input.focus(); return; }
  const users = loadUserList();
  if (!users.includes(name)) {
    users.push(name);
    saveUserList(users);
  }
  enterAsUser(name);
}

function enterAsUser(name) {
  currentUser = name;
  currentUserBadge.textContent = name;
  switchUserBtn.classList.remove('hidden');
  exportDataBtn.classList.remove('hidden');
  progressBadge.classList.remove('hidden');
  bottomNav.classList.remove('hidden');

  shuffledOrder = ALL_QUESTIONS.map(q => q.id);
  const progress = loadProgress();
  currentIndex = Math.min(Math.max(progress.index || 0, 0), shuffledOrder.length - 1);
  if (currentIndex < 0) currentIndex = 0;
  renderPracticeView();
}

switchUserBtn.addEventListener('click', () => {
  currentUser = null;
  exportDataBtn.classList.add('hidden');
  renderUserSelectScreen();
});

function setActiveNav(view) {
  currentView = view;
  navPractice.classList.toggle('active', view === 'practice');
  navReview.classList.toggle('active', view === 'review');
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function isMultiAnswer(q) {
  return Array.isArray(q.correct_answer) && q.correct_answer.length > 1;
}

/* bold the leading "第X條：" portion of a law article */
function formatLawArticle(text) {
  const esc = escapeHtml(text || '');
  return esc.replace(/^([^：:]{1,42}[：:])/, '<span class="law-art">$1</span>');
}

function renderPracticeCard(q, qIndexLabel, isReview) {
  const wrongBook = loadWrongBook();
  const isWrongBefore = !!wrongBook[q.id];

  const optionsHtml = q.options.map((opt, i) => {
    return `<button data-opt="${escapeHtml(opt)}" class="option-btn opt">
      <span class="opt__badge">${String.fromCharCode(65+i)}</span>
      <span class="opt__text">${escapeHtml(opt)}</span>
      <span class="opt__mark"></span>
    </button>`;
  }).join('');

  const flags = [];
  if (isMultiAnswer(q)) flags.push('<span class="flag flag--warn">⚠ 多重給分／送分疑義題</span>');
  if (isWrongBefore) flags.push('<span class="flag flag--rose">📕 曾錯過</span>');

  mainArea.innerHTML = `
  ${isReview ? `<div class="mode-strip">
    <span class="pill pill--rose">📕 錯題練習模式</span>
    <button id="exitReviewPracticeBtn" class="pill pill--ghost">結束練習，返回複習本</button>
  </div>` : ''}
  <div class="card">
    <div class="card__meta">
      <span class="qid">${escapeHtml(q.id)}</span>
      <span class="qcount">${escapeHtml(qIndexLabel)}</span>
    </div>
    ${flags.length ? `<div class="flags">${flags.join('')}</div>` : ''}
    <p class="qtext">${escapeHtml(q.question)}</p>
    <div id="optionsWrap" class="opts">${optionsHtml}</div>
    <div id="answerPanel" class="answer hidden"></div>
  </div>
  <div class="navrow">
    <button id="prevBtn" class="btn btn--soft">← 上一題</button>
    <button id="nextBtn" class="btn btn--accent">下一題 →</button>
  </div>
  `;

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(q, btn, isReview));
  });
  if (isReview) {
    document.getElementById('exitReviewPracticeBtn').addEventListener('click', () => {
      isReviewPracticeMode = false;
      renderReviewView();
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
      reviewIndex = (reviewIndex - 1 + reviewOrder.length) % reviewOrder.length;
      showReviewPracticeQuestion();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      reviewIndex = (reviewIndex + 1) % reviewOrder.length;
      showReviewPracticeQuestion();
    });
  } else {
    document.getElementById('prevBtn').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + shuffledOrder.length) % shuffledOrder.length;
      saveProgress();
      showPracticeQuestion();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % shuffledOrder.length;
      saveProgress();
      showPracticeQuestion();
    });
  }
}

function handleAnswer(q, clickedBtn, isReview) {
  const selected = clickedBtn.getAttribute('data-opt');
  const correctSet = new Set((q.correct_answer || []).map(a => String(a)));
  const isCorrect = correctSet.has(selected);

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    const val = btn.getAttribute('data-opt');
    if (correctSet.has(val)) {
      btn.classList.add('correct');
    } else if (btn === clickedBtn) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dim');
    }
  });

  const wrongBook = loadWrongBook();
  if (!isCorrect) {
    wrongBook[q.id] = { ts: Date.now(), question: q };
    saveWrongBook(wrongBook);
  }

  const multi = isMultiAnswer(q);
  const panel = document.getElementById('answerPanel');
  panel.classList.remove('hidden');
  panel.innerHTML = `
    <div class="banner ${isCorrect ? 'banner--ok' : 'banner--bad'}">
      <p class="banner__head">${isCorrect ? '✓ 答對了！' : '✕ 答錯了'}</p>
      <p class="banner__ans">正確答案：<b>${q.correct_answer.map(escapeHtml).join('、')}</b></p>
      ${(!multi && q.answer_reason) ? `<p class="banner__reason">${escapeHtml(q.answer_reason)}</p>` : ''}
    </div>
    ${multi ? `<div class="alert alert--warn">
      <p class="alert__label">⚠ 考選部多重給分／送分提示</p>
      <p class="alert__body">${escapeHtml(q.answer_reason || '本題經官方公告調整給分，請以最新公告之標準答案為準。')}</p>
    </div>` : ''}
    <div class="lawblock">
      <p class="lawblock__label">📖 法規條文</p>
      <p class="lawblock__body">${formatLawArticle(q.law_article)}</p>
    </div>
    <div class="alert alert--neutral">
      <p class="alert__label">💡 詳細解析</p>
      <p class="alert__body">${escapeHtml(q.explanation || '')}</p>
      <p class="alert__meta">分類：${escapeHtml(q.law_category || '未分類')}</p>
    </div>
    <div class="alert alert--info">
      <p class="alert__label">🔁 易混淆延伸對比</p>
      <p class="alert__body">${escapeHtml(q.extended_notes || '')}</p>
    </div>
    ${isReview ? `<button id="removeFromWrongBtn" class="btn ${isCorrect ? 'btn--ok' : 'btn--soft'} btn--block">${isCorrect ? '✓ 這題已掌握，移出複習本' : '仍未掌握，保留在複習本（移出）'}</button>` : ''}
  `;

  if (isReview) {
    document.getElementById('removeFromWrongBtn').addEventListener('click', () => {
      const book = loadWrongBook();
      delete book[q.id];
      saveWrongBook(book);
      reviewOrder = reviewOrder.filter(id => id !== q.id);
      if (reviewOrder.length === 0) {
        isReviewPracticeMode = false;
        renderReviewView();
        return;
      }
      reviewIndex = reviewIndex % reviewOrder.length;
      showReviewPracticeQuestion();
    });
  }
}

function showPracticeQuestion() {
  const q = ALL_QUESTIONS.find(x => x.id === shuffledOrder[currentIndex]);
  progressBadge.textContent = `${currentIndex+1} / ${shuffledOrder.length}`;
  renderPracticeCard(q, `第 ${currentIndex+1} 題 / 共 ${shuffledOrder.length} 題`, false);
}

function renderPracticeView() {
  isReviewPracticeMode = false;
  setActiveNav('practice');
  progressBadge.classList.remove('hidden');
  if (shuffledOrder.length === 0) {
    shuffledOrder = ALL_QUESTIONS.map(q => q.id);
  }
  showPracticeQuestion();
}

/* ---------- Review Practice Mode ---------- */
function startReviewPractice() {
  const wrongBook = loadWrongBook();
  reviewOrder = Object.keys(wrongBook);
  if (reviewOrder.length === 0) return;
  reviewIndex = 0;
  isReviewPracticeMode = true;
  showReviewPracticeQuestion();
}

function showReviewPracticeQuestion() {
  const wrongBook = loadWrongBook();
  const id = reviewOrder[reviewIndex];
  const q = (wrongBook[id] && wrongBook[id].question) || ALL_QUESTIONS.find(x => x.id === id);
  if (!q) { renderReviewView(); return; }
  progressBadge.classList.remove('hidden');
  progressBadge.textContent = `${reviewIndex+1} / ${reviewOrder.length}`;
  renderPracticeCard(q, `錯題練習 第 ${reviewIndex+1} 題 / 共 ${reviewOrder.length} 題`, true);
}

/* ---------- Review Book ---------- */
function buildCategoryTree(items) {
  const tree = {};
  items.forEach(({ id, q }) => {
    const path = (q.law_category || '未分類').split('/').map(s => s.trim()).filter(Boolean);
    let node = tree;
    path.forEach((seg, i) => {
      if (!node[seg]) node[seg] = { __children: {}, __items: [] };
      if (i === path.length - 1) node[seg].__items.push({ id, q });
      node = node[seg].__children;
    });
  });
  return tree;
}

const CHEV = '<svg class="tchev-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';

function renderTreeNode(node, depth, pathKey) {
  let html = '';
  Object.keys(node).forEach(key => {
    const entry = node[key];
    const nodeId = `${pathKey}__${key}`.replace(/[^a-zA-Z0-9_一-鿿]/g, '_');
    const childCount = countAllItems(entry);
    html += `
    <div class="tnode tnode--d${depth>2?2:depth}">
      <button class="thead tree-toggle" data-target="${nodeId}">
        <span class="tchev">${CHEV}</span>
        <span class="tlabel">${escapeHtml(key)}</span>
        <span class="tcount">${childCount}</span>
      </button>
      <div id="${nodeId}" class="tbody">
        <div class="tbody__in">
          ${renderTreeNode(entry.__children, depth+1, nodeId)}
          ${entry.__items.map(it => renderWrongItem(it)).join('')}
        </div>
      </div>
    </div>`;
  });
  return html;
}

function countAllItems(entry) {
  let count = entry.__items.length;
  Object.values(entry.__children).forEach(child => { count += countAllItems(child); });
  return count;
}

function renderWrongItem({ id, q }) {
  return `
  <div class="witem">
    <div class="witem__top">
      <span class="qid">${escapeHtml(id)}</span>
      <button class="witem__rm remove-wrong-btn" data-id="${escapeHtml(id)}">移除 ✕</button>
    </div>
    <p class="witem__q">${escapeHtml(q.question)}</p>
    <p class="witem__line ans"><span class="lbl">正確答案：</span>${(q.correct_answer||[]).map(escapeHtml).join('、')}</p>
    <p class="witem__line law"><span class="lbl">📖</span> ${escapeHtml(q.law_article || '')}</p>
    <p class="witem__line exp"><span class="lbl">💡</span> ${escapeHtml(q.explanation || '')}</p>
    <p class="witem__line ext"><span class="lbl">🔁</span> ${escapeHtml(q.extended_notes || '')}</p>
  </div>`;
}

function renderReviewView() {
  isReviewPracticeMode = false;
  setActiveNav('review');
  progressBadge.classList.add('hidden');
  const wrongBook = loadWrongBook();
  const items = Object.keys(wrongBook).map(id => ({ id, q: wrongBook[id].question }));

  if (items.length === 0) {
    mainArea.innerHTML = `<div class="center-state">
      <div class="center-state__emoji">🎉</div>
      <p>目前沒有錯題</p>
      <p style="color:var(--text-faint);font-size:13px;margin-top:4px;">繼續刷題，答錯的題目會自動收進複習本</p>
    </div>`;
    return;
  }

  const tree = buildCategoryTree(items);
  mainArea.innerHTML = `
    <div class="review-head">
      <h2>錯題複習本 <span class="count-strong">${items.length}</span> 題</h2>
      <button id="clearAllWrongBtn" class="pill pill--ghost">清空全部</button>
    </div>
    <button id="startReviewPracticeBtn" class="btn btn--accent btn--block" style="margin-bottom:16px;">🔄 開始錯題重新挑戰（${items.length} 題）</button>
    <div class="tree" id="treeWrap">${renderTreeNode(tree, 0, 'root')}</div>
  `;

  const startBtn = document.getElementById('startReviewPracticeBtn');
  if (startBtn) startBtn.addEventListener('click', startReviewPractice);

  document.querySelectorAll('.tree-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.closest('.tnode').classList.toggle('open');
    });
  });
  document.querySelectorAll('.remove-wrong-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      const book = loadWrongBook();
      delete book[id];
      saveWrongBook(book);
      renderReviewView();
    });
  });
  const clearBtn = document.getElementById('clearAllWrongBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (confirm('確定要清空所有錯題紀錄嗎？')) {
        saveWrongBook({});
        renderReviewView();
      }
    });
  }
}

navPractice.addEventListener('click', renderPracticeView);
navReview.addEventListener('click', renderReviewView);

fetch(DATA_URL)
  .then(res => {
    if (!res.ok) throw new Error('題庫載入失敗：' + res.status);
    return res.json();
  })
  .then(data => {
    ALL_QUESTIONS = data;
    renderUserSelectScreen();
  })
  .catch(err => {
    const isSandboxIssue = /Failed to parse URL/i.test(err.message);
    mainArea.innerHTML = `<div class="errbox">
      <div class="errbox__emoji">⚠️</div>
      <p style="font-weight:700;">${escapeHtml(err.message)}</p>
      ${isSandboxIssue
        ? `<p class="hint">這通常代表目前是在「沙盒化預覽面板」中開啟，該環境沒有真實網址基準，fetch 無法載入本機檔案。<br>請改用瀏覽器分頁開啟本機伺服器網址（例如 http://localhost:8765/index.html）或正式部署網址，即可正常載入題庫。</p>`
        : `<p class="hint">請確認 (114-113)_questions.json 與 index.html 位於同一目錄，並以本機伺服器（非 file://）方式開啟。</p>`}
    </div>`;
  });
</script>
</body>
</html>
